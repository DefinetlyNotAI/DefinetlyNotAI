#F0F3F6" class="lang-label" text-anchor="middle">C++ 11.36%</text><text x="998.0" y="667" fill="#7D8590" class="lang-label">|</text><text x="1073.0" y="667" fill="#F0F3F6" class="lang-label" text-anchor="middle">Others 14.02%</text><text x="1148" y="667" fill="#7D8590" class="lang-label">|</text><text x="48.0" y="701" fill="#3572A5" textLength="820.0" lengthAdjust="spacingAndGlyphs" class="lang-bar">##################################################################################</text><text x="868.0" y="701" fill="#F34B7D" textLength="130.0" lengthAdjust="spacingAndGlyphs" class="lang-bar">#############</text><text x="998.0" y="701" fill="#8B949E" textLength="150.0" lengthAdjust="spacingAndGlyphs" class="lang-bar">###############</text><text x="48" y="738" fill="#7D8590" class="small">Others: HTML, C, TypeScript, Cython, JavaScript, Cuda, C#, PowerShell, CMake, Shell, Pascal, Smarty,</text><text x="48" y="759" fill="#7D8590" class="small">Fortran, Ren&#x27;Py, XSLT, PLpgSQL, Objective-C, Batchfile, Kotlin, Java, Assembly, NASL, Makefile, BitBake,</text><text x="48" y="780" fill="#7D8590" class="small">Meson, Rust, Mako, Swift, Vim Script, Scala, Jinja</text><text x="48" y="840" fill="#39D353">shahm@github</text><text x="166" y="840" fill="#F0F3F6">:</text><text x="178" y="840" fill="#58A6FF">~</text><text x="192" y="840" fill="#F0F3F6">$ github-stats --verbose</text><text x="48" y="875" fill="#7D8590">|-- repositories</text><text x="366" y="875" fill="#F0F3F6">43</text><text x="48" y="904" fill="#7D8590">|-- commits</text><text x="366" y="904" fill="#58A6FF">6405</text><text x="48" y="933" fill="#7D8590">|-- total_stars</text><text x="366" y="933" fill="#D29922">473</text><text x="48" y="962" fill="#7D8590">|-- followers</text><text x="366" y="962" fill="#58A6FF">67</text><text x="48" y="991" fill="#7D8590">|-- active_commit_days</text><text x="366" y="991" fill="#39D353">654</text><text x="624" y="875" fill="#7D8590">|-- net_lines</text><text x="942" y="875" fill="#39D353">8074918</text><text x="624" y="904" fill="#7D8590">|-- additions</text><text x="942" y="904" fill="#39D353">+10,405,766</text><text x="624" y="933" fill="#7D8590">|-- deletions</text><text x="942" y="933" fill="#F85149">-2,330,848</text><text x="624" y="962" fill="#7D8590">|-- code_churn</text><text x="942" y="962" fill="#D29922">12736614</text><text x="624" y="991" fill="#7D8590">|-- jordan_rank</text><text x="942" y="991" fill="#58A6FF">#2</text><text x="48" y="1035" fill="#7D8590">|-- longest_commit_streak</text><text x="366" y="1035" fill="#39D353">172 days</text><text x="500" y="1035" fill="#7D8590">[07 May 2024 - 25 Oct 2024]</text><text x="48" y="1087" fill="#39D353">shahm@github</text><text x="166" y="1087" fill="#F0F3F6">:</text><text x="178" y="1087" fill="#58A6FF">~</text><text x="192" y="1087" fill="#F0F3F6">$ about</text><text x="48" y="1121" fill="#F0F3F6">I’m Shahm Najeeb, a full-stack developer, systems builder, and student</text><text x="48" y="1143" fill="#F0F3F6">technology organizer focused on turning ambitious ideas into working software.</text><text x="48" y="1187" fill="#F0F3F6">My portfolio spans production-ready web platforms, developer tooling,</text><text x="48" y="1209" fill="#F0F3F6">cybersecurity and digital-forensics utilities, NFC infrastructure, embedded</text><text x="48" y="1231" fill="#F0F3F6">systems, machine learning experiments, browser extensions, simulations, and</text><text x="48" y="1253" fill="#F0F3F6">interactive ARG experiences. I work mainly with TypeScript, Python, Next.js,</text><text x="48" y="1275" fill="#F0F3F6">React, PostgreSQL, JavaScript, C, C#, PowerShell, and ESP32 hardware.</text><text x="48" y="1319" fill="#F0F3F6">Some of my larger projects include an NFC-based conference management</text><text x="48" y="1341" fill="#F0F3F6">platform, a self-hosted API and WebSocket sandbox, a TypeScript code-quality</text><text x="48" y="1363" fill="#F0F3F6">analyzer published as a CLI, a Windows forensic data collection system, a</text><text x="48" y="1385" fill="#F0F3F6">digital banking simulation, and Facility, a multi-part psychological-horror</text><text x="48" y="1407" fill="#F0F3F6">ARG with custom websites, terminal games, bots, puzzles, and supporting tools</text><text x="48" y="1429" fill="#F0F3F6">- all of which are open-sourced.</text><text x="48" y="1473" fill="#F0F3F6">Outside development, I founded Hack Street, a non-profit student organization</text><text x="48" y="1495" fill="#F0F3F6">supported through Hack Club’s HCB program for 2.5 years. I have helped</text><text x="48" y="1517" fill="#F0F3F6">organize and lead more than 4 student hackathons while creating the websites,</text><text x="48" y="1539" fill="#F0F3F6">registration systems, schedules, infrastructure, and interactive experiences</text><text x="48" y="1561" fill="#F0F3F6">behind them gathering over 300 students/hackers.</text><text x="48" y="1605" fill="#F0F3F6">I also have over 9 years of structured robotics experience, including</text><text x="48" y="1627" fill="#F0F3F6">embedded systems, competition programming, Arduino based robotics, and</text><text x="48" y="1649" fill="#F0F3F6">regional robotics events. I enjoy projects that combine software, hardware,</text><text x="48" y="1671" fill="#F0F3F6">infrastructure, and creative problem-solving into something people can</text><text x="48" y="1693" fill="#F0F3F6">actually use.</text><text x="48" y="1742" fill="#39D353">shahm@github</text><text x="166" y="1742" fill="#F0F3F6">:</text><text x="178" y="1742" fill="#58A6FF">~</text><text x="192" y="1742" fill="#F0F3F6">$ </text><rect x="211" y="1728" width="9" height="17" fill="#F0F3F6"/></svg>