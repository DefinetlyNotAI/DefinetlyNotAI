<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1802" viewBox="0 0 1200 1802"><rect width="1200" height="1802" rx="16" fill="#EDF2F7"/><rect x="20" y="20" width="1160" height="1762" rx="12" fill="#FFFFFF" stroke="#BCC8D4"/><circle cx="48" cy="47" r="6" fill="#CF222E"/><circle cx="68" cy="47" r="6" fill="#9A6700"/><circle cx="88" cy="47" r="6" fill="#1A7F37"/><style>text{font-family:ui-monospace,SFMono-Regular,Consolas,Liberation Mono,monospace;font-size:15px;white-space:pre}.small{font-size:13px}.head{font-size:19px;font-weight:700}.avatar{font-size:14px}.bar{font-size:18px;font-weight:700}</style><text x="112" y="53" fill="#66717E" class="small">profile-readme : bash</text><line x1="20" y1="72" x2="1180" y2="72" stroke="#BCC8D4"/><text x="48" y="106" fill="#1A7F37">shahm@github</text><text x="166" y="106" fill="#17212B">:</text><text x="178" y="106" fill="#0969DA">~</text><text x="192" y="106" fill="#17212B">$ ./profile --live --ascii</text><text x="48" y="137" fill="#66717E">[ok] loading public GitHub activity...</text><text x="48" y="175" fill="#17212B" class="head">Shahm Najeeb</text><text x="255" y="175" fill="#0969DA" class="head">@DefinetlyNotAI</text><text x="48" y="205" fill="#17212B" class="avatar">%%%%%%############*###***************#########</text><text x="48" y="222" fill="#17212B" class="avatar">%%%%######*#*********##*++++++*++++*****#**###</text><text x="48" y="239" fill="#17212B" class="avatar">%%%####*****##*++++*+++*+==+=++=++=++++*******</text><text x="48" y="256" fill="#17212B" class="avatar">%%%###***+++#*++==+*+===--=--::--:-====++++***</text><text x="48" y="273" fill="#17212B" class="avatar">####***+**++====*+=-==-==::::..::..::--==++++*</text><text x="48" y="290" fill="#17212B" class="avatar">*#****++##===++====---+-=:.........::::=====++</text><text x="48" y="307" fill="#17212B" class="avatar">****+++++=--=++-==+::--:...-:..:-:.:.::==-===+</text><text x="48" y="324" fill="#17212B" class="avatar">*****#*=+*=:-::-+--+%@%#=..--.......-::--=-===</text><text x="48" y="341" fill="#17212B" class="avatar">******+==+-:++:-::@%**+#@: -....  ..-::--=====</text><text x="48" y="358" fill="#17212B" class="avatar">#*****+==--==--+-:#+:.:+#=.:.:-:  ...::--=--==</text><text x="48" y="375" fill="#17212B" class="avatar">****++++*-++==-=--=#*:=+=::-:-:.  --..:--+=-==</text><text x="48" y="392" fill="#17212B" class="avatar">#***+++==*=-==--=-=-.-..-=:.::-. .-.:--:-----=</text><text x="48" y="409" fill="#17212B" class="avatar">#******+*+=+=+==-::=-:.:.=-:+:.:..:::--------=</text><text x="48" y="426" fill="#17212B" class="avatar">##*****=+++=+=+--=+##.= :@@#*++-.:=-::--+=---=</text><text x="48" y="443" fill="#17212B" class="avatar">#****+++++-=++-#%@@@%-#:%@@@@@@*:..::--=+=--==</text><text x="48" y="460" fill="#17212B" class="avatar">##****+++=++*=+@@@@@@+*%@@%@@@@%:::::--===--==</text><text x="48" y="477" fill="#17212B" class="avatar">##****++++==+-#@@@@@@%#@@@@@@@@@-------===-===</text><text x="48" y="494" fill="#17212B" class="avatar">##*****++++++=*@@@@@@@@@@@@@@@@@=:===-====-===</text><text x="48" y="511" fill="#17212B" class="avatar">###****+++==+=+@@@@@@@@@@@@@@@@@=:---=========</text><text x="48" y="528" fill="#17212B" class="avatar">###******++===+@@@@@@@@@@@@@@@@@=----=========</text><text x="48" y="545" fill="#17212B" class="avatar">######****+++=+@@@@@@@@@@@@@@@@#---=====+====+</text><text x="48" y="562" fill="#17212B" class="avatar">%######****+++=*@@@@@@@@@@@@@@#===============</text><text x="48" y="633" fill="#1A7F37">shahm@github</text><text x="166" y="633" fill="#17212B">:</text><text x="178" y="633" fill="#0969DA">~</text><text x="192" y="633" fill="#17212B">$ github-languages --aggregate --by-bytes</text><text x="48" y="664" fill="#17212B">| Python 71.03% | C++ 10.81% | HTML 4.86% | Jupyter Notebook 4.56% | C 3.28% | TypeScript 2.97% |</text><text x="48" y="686" fill="#17212B">| Others 2.49% |</text><text x="48" y="718" fill="#3572A5" class="bar">###################################################</text><text x="509.55" y="718" fill="#F34B7D" class="bar">########</text><text x="581.95" y="718" fill="#E34C26" class="bar">####</text><text x="618.1500000000001" y="718" fill="#DA5B0B" class="bar">###</text><text x="645.3000000000001" y="718" fill="#555555" class="bar">##</text><text x="663.4000000000001" y="718" fill="#3178C6" class="bar">##</text><text x="681.5000000000001" y="718" fill="#8B949E" class="bar">##</text><text x="48" y="751" fill="#66717E" class="small">Others: Cython, JavaScript, Cuda, CSS, C#, PowerShell, CMake, Shell, Pascal, Smarty, Fortran, Ren&#x27;Py, XSLT,</text><text x="48" y="772" fill="#66717E" class="small">PLpgSQL, Objective-C, SCSS, Batchfile, Kotlin, Java, Assembly, NASL, Makefile, BitBake, Meson, Rust, Mako,</text><text x="48" y="793" fill="#66717E" class="small">Swift, Vim Script, Scala, Jinja</text><text x="48" y="853" fill="#1A7F37">shahm@github</text><text x="166" y="853" fill="#17212B">:</text><text x="178" y="853" fill="#0969DA">~</text><text x="192" y="853" fill="#17212B">$ github-stats --verbose</text><text x="48" y="888" fill="#66717E">|-- repositories</text><text x="366" y="888" fill="#17212B">43</text><text x="48" y="917" fill="#66717E">|-- commits</text><text x="366" y="917" fill="#17212B">6,400</text><text x="48" y="946" fill="#66717E">|-- total_stars</text><text x="366" y="946" fill="#17212B">474</text><text x="48" y="975" fill="#66717E">|-- followers</text><text x="366" y="975" fill="#17212B">66</text><text x="48" y="1004" fill="#66717E">|-- active_commit_days</text><text x="366" y="1004" fill="#17212B">653</text><text x="624" y="888" fill="#66717E">|-- net_lines</text><text x="942" y="888" fill="#17212B">8,074,840</text><text x="624" y="917" fill="#66717E">|-- additions</text><text x="942" y="917" fill="#17212B">+10,405,476</text><text x="624" y="946" fill="#66717E">|-- deletions</text><text x="942" y="946" fill="#17212B">-2,330,636</text><text x="624" y="975" fill="#66717E">|-- code_churn</text><text x="942" y="975" fill="#17212B">12,736,112</text><text x="624" y="1004" fill="#66717E">|-- jordan_rank</text><text x="942" y="1004" fill="#17212B">#2</text><text x="48" y="1048" fill="#66717E">|-- longest_commit_streak</text><text x="366" y="1048" fill="#17212B">172 days</text><text x="500" y="1048" fill="#66717E">[07 May 2024 - 25 Oct 2024]</text><text x="48" y="1100" fill="#1A7F37">shahm@github</text><text x="166" y="1100" fill="#17212B">:</text><text x="178" y="1100" fill="#0969DA">~</text><text x="192" y="1100" fill="#17212B">$ about</text><text x="48" y="1134" fill="#17212B">I’m Shahm Najeeb, a full-stack developer, systems builder, and student</text><text x="48" y="1156" fill="#17212B">technology organizer focused on turning ambitious ideas into working software.</text><text x="48" y="1200" fill="#17212B">My portfolio spans production-ready web platforms, developer tooling,</text><text x="48" y="1222" fill="#17212B">cybersecurity and digital-forensics utilities, NFC infrastructure, embedded</text><text x="48" y="1244" fill="#17212B">systems, machine learning experiments, browser extensions, simulations, and</text><text x="48" y="1266" fill="#17212B">interactive ARG experiences. I work mainly with TypeScript, Python, Next.js,</text><text x="48" y="1288" fill="#17212B">React, PostgreSQL, JavaScript, C, C#, PowerShell, and ESP32 hardware.</text><text x="48" y="1332" fill="#17212B">Some of my larger projects include an NFC-based conference management</text><text x="48" y="1354" fill="#17212B">platform, a self-hosted API and WebSocket sandbox, a TypeScript code-quality</text><text x="48" y="1376" fill="#17212B">analyzer published as a CLI, a Windows forensic data collection system, a</text><text x="48" y="1398" fill="#17212B">digital banking simulation, and Facility, a multi-part psychological-horror</text><text x="48" y="1420" fill="#17212B">ARG with custom websites, terminal games, bots, puzzles, and supporting tools</text><text x="48" y="1442" fill="#17212B">- all of which are open-sourced.</text><text x="48" y="1486" fill="#17212B">Outside development, I founded Hack Street, a non-profit student organization</text><text x="48" y="1508" fill="#17212B">supported through Hack Club’s HCB program for 2.5 years. I have helped</text><text x="48" y="1530" fill="#17212B">organize and lead more than 4 student hackathons while creating the websites,</text><text x="48" y="1552" fill="#17212B">registration systems, schedules, infrastructure, and interactive experiences</text><text x="48" y="1574" fill="#17212B">behind them gathering over 300 students/hackers.</text><text x="48" y="1618" fill="#17212B">I also have over 9 years of structured robotics experience, including</text><text x="48" y="1640" fill="#17212B">embedded systems, competition programming, Arduino based robotics, and</text><text x="48" y="1662" fill="#17212B">regional robotics events. I enjoy projects that combine software, hardware,</text><text x="48" y="1684" fill="#17212B">infrastructure, and creative problem-solving into something people can</text><text x="48" y="1706" fill="#17212B">actually use.</text><text x="48" y="1755" fill="#1A7F37">shahm@github</text><text x="166" y="1755" fill="#17212B">:</text><text x="178" y="1755" fill="#0969DA">~</text><text x="192" y="1755" fill="#17212B">$ </text><rect x="211" y="1741" width="9" height="17" fill="#17212B"/></svg>