#17212B" class="lang-label" text-anchor="middle">C++ 11.36%</text><text x="998.0" y="667" fill="#66717E" class="lang-label">|</text><text x="1073.0" y="667" fill="#17212B" class="lang-label" text-anchor="middle">Others 14.02%</text><text x="1148" y="667" fill="#66717E" class="lang-label">|</text><text x="48.0" y="701" fill="#3572A5" textLength="820.0" lengthAdjust="spacingAndGlyphs" class="lang-bar">##################################################################################</text><text x="868.0" y="701" fill="#F34B7D" textLength="130.0" lengthAdjust="spacingAndGlyphs" class="lang-bar">#############</text><text x="998.0" y="701" fill="#8B949E" textLength="150.0" lengthAdjust="spacingAndGlyphs" class="lang-bar">###############</text><text x="48" y="738" fill="#66717E" class="small">Others: HTML, C, TypeScript, Cython, JavaScript, Cuda, C#, PowerShell, CMake, Shell, Pascal, Smarty,</text><text x="48" y="759" fill="#66717E" class="small">Fortran, Ren&#x27;Py, XSLT, PLpgSQL, Objective-C, Batchfile, Kotlin, Java, Assembly, NASL, Makefile, BitBake,</text><text x="48" y="780" fill="#66717E" class="small">Meson, Rust, Mako, Swift, Vim Script, Scala, Jinja</text><text x="48" y="840" fill="#1A7F37">shahm@github</text><text x="166" y="840" fill="#17212B">:</text><text x="178" y="840" fill="#0969DA">~</text><text x="192" y="840" fill="#17212B">$ github-stats --verbose</text><text x="48" y="875" fill="#66717E">|-- repositories</text><text x="366" y="875" fill="#17212B">43</text><text x="48" y="904" fill="#66717E">|-- commits</text><text x="366" y="904" fill="#0969DA">6402</text><text x="48" y="933" fill="#66717E">|-- total_stars</text><text x="366" y="933" fill="#9A6700">474</text><text x="48" y="962" fill="#66717E">|-- followers</text><text x="366" y="962" fill="#0969DA">66</text><text x="48" y="991" fill="#66717E">|-- active_commit_days</text><text x="366" y="991" fill="#1A7F37">653</text><text x="624" y="875" fill="#66717E">|-- net_lines</text><text x="942" y="875" fill="#1A7F37">8074918</text><text x="624" y="904" fill="#66717E">|-- additions</text><text x="942" y="904" fill="#1A7F37">+10,405,763</text><text x="624" y="933" fill="#66717E">|-- deletions</text><text x="942" y="933" fill="#CF222E">-2,330,845</text><text x="624" y="962" fill="#66717E">|-- code_churn</text><text x="942" y="962" fill="#9A6700">12736608</text><text x="624" y="991" fill="#66717E">|-- jordan_rank</text><text x="942" y="991" fill="#0969DA">#2</text><text x="48" y="1035" fill="#66717E">|-- longest_commit_streak</text><text x="366" y="1035" fill="#1A7F37">172 days</text><text x="500" y="1035" fill="#66717E">[07 May 2024 - 25 Oct 2024]</text><text x="48" y="1087" fill="#1A7F37">shahm@github</text><text x="166" y="1087" fill="#17212B">:</text><text x="178" y="1087" fill="#0969DA">~</text><text x="192" y="1087" fill="#17212B">$ about</text><text x="48" y="1121" fill="#17212B">I’m Shahm Najeeb, a full-stack developer, systems builder, and student</text><text x="48" y="1143" fill="#17212B">technology organizer focused on turning ambitious ideas into working software.</text><text x="48" y="1187" fill="#17212B">My portfolio spans production-ready web platforms, developer tooling,</text><text x="48" y="1209" fill="#17212B">cybersecurity and digital-forensics utilities, NFC infrastructure, embedded</text><text x="48" y="1231" fill="#17212B">systems, machine learning experiments, browser extensions, simulations, and</text><text x="48" y="1253" fill="#17212B">interactive ARG experiences. I work mainly with TypeScript, Python, Next.js,</text><text x="48" y="1275" fill="#17212B">React, PostgreSQL, JavaScript, C, C#, PowerShell, and ESP32 hardware.</text><text x="48" y="1319" fill="#17212B">Some of my larger projects include an NFC-based conference management</text><text x="48" y="1341" fill="#17212B">platform, a self-hosted API and WebSocket sandbox, a TypeScript code-quality</text><text x="48" y="1363" fill="#17212B">analyzer published as a CLI, a Windows forensic data collection system, a</text><text x="48" y="1385" fill="#17212B">digital banking simulation, and Facility, a multi-part psychological-horror</text><text x="48" y="1407" fill="#17212B">ARG with custom websites, terminal games, bots, puzzles, and supporting tools</text><text x="48" y="1429" fill="#17212B">- all of which are open-sourced.</text><text x="48" y="1473" fill="#17212B">Outside development, I founded Hack Street, a non-profit student organization</text><text x="48" y="1495" fill="#17212B">supported through Hack Club’s HCB program for 2.5 years. I have helped</text><text x="48" y="1517" fill="#17212B">organize and lead more than 4 student hackathons while creating the websites,</text><text x="48" y="1539" fill="#17212B">registration systems, schedules, infrastructure, and interactive experiences</text><text x="48" y="1561" fill="#17212B">behind them gathering over 300 students/hackers.</text><text x="48" y="1605" fill="#17212B">I also have over 9 years of structured robotics experience, including</text><text x="48" y="1627" fill="#17212B">embedded systems, competition programming, Arduino based robotics, and</text><text x="48" y="1649" fill="#17212B">regional robotics events. I enjoy projects that combine software, hardware,</text><text x="48" y="1671" fill="#17212B">infrastructure, and creative problem-solving into something people can</text><text x="48" y="1693" fill="#17212B">actually use.</text><text x="48" y="1742" fill="#1A7F37">shahm@github</text><text x="166" y="1742" fill="#17212B">:</text><text x="178" y="1742" fill="#0969DA">~</text><text x="192" y="1742" fill="#17212B">$ </text><rect x="211" y="1728" width="9" height="17" fill="#17212B"/></svg>