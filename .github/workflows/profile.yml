name: Refresh profile

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"
  push:
    paths:
      - generate.py
      - .github/workflows/profile.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Verify checkout
        run: test -f generate.py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate profile SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate.py
      - name: Commit changed stats
        run: |
          git config user.name "profile-readme-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git diff --cached --quiet || git commit -m "chore: refresh profile stats"
          git push
